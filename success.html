<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | Needs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-white rounded-[3rem] shadow-2xl p-10 text-center border border-slate-100">
        <!-- Success Icon -->
        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-3xl font-black text-slate-900 tracking-tighter mb-2">BOOKED!</h1>
        <p class="text-slate-500 font-medium mb-8">
            Your request for <span id="worker-name" class="text-green-600 font-bold italic">the professional</span> has been sent successfully.
        </p>

        <div class="bg-slate-50 rounded-2xl p-4 mb-8 text-left">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">What's Next?</p>
            <p class="text-sm text-slate-600 font-bold leading-tight">The professional will contact you within 15 minutes to confirm the timing.</p>
        </div>

        <button onclick="window.location.href='index.html'" class="w-full bg-black text-white py-4 rounded-2xl font-black hover:bg-green-500 hover:text-black transition-all active:scale-95">
            BACK TO HOME
        </button>
    </div>

    <script>
        // Get worker name from URL to personalize the message
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('worker');
        if (name) {
            document.getElementById('worker-name').innerText = decodeURIComponent(name);
        }
    </script>
</body>
</html>
