<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Needs | Available Professionals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <button onclick="window.history.back()" class="flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-black transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                BACK
            </button>
            <h1 id="category-title" class="text-lg font-black uppercase italic tracking-tighter">Available <span class="text-green-600">Plumbers</span></h1>
            <div class="w-8"></div> </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 sm:p-6">
        
        <div class="mb-6 flex justify-between items-end">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Location</p>
                <h2 class="text-xl font-bold text-slate-800">Mudunuru, Andhra Pradesh</h2>
            </div>
            <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-black uppercase">
                8 Pros Found
            </div>
        </div>

        <div class="space-y-4">
            </div>
    </main>

    <script>
    // Data Store with correct clean local paths
    const allWorkers = [
        { 
            name: "Venkatesh Reddy", 
            category: "Plumber", 
            rating: 4.9, 
            reviews: 124, 
            exp: "8 Years", 
            fee: 199, 
            tags: ["PIPE LEAKAGE", "TANK CLEANING"], 
            img: "images/aggi petti macha.jpg"
        },
        { 
            name: "Ravi Teja", 
            category: "Plumber", 
            rating: 4.7, 
            reviews: 89, 
            exp: "4 Years", 
            fee: 149, 
            tags: ["TAP REPAIR", "SANITARY"], 
            img: "images/uppal balu.webp" 
        },
        { 
            name: "Suresh Kumar", 
            category: "Electrician", 
            rating: 4.8, 
            reviews: 210, 
            exp: "10 Years", 
            fee: 249, 
            tags: ["WIRING", "FUSE BOX"], 
            img: "images/rakesh-master.jpg" 
        },
        { 
            name: "Anil Verma", 
            category: "Electrician", 
            rating: 4.6, 
            reviews: 56, 
            exp: "3 Years", 
            fee: 199, 
            tags: ["LIGHTING", "AC REPAIR"], 
            img: "images/Screenshot 2026-05-09 191500.png" 
        }
    ];

    // URL Parsing Setup
    const urlParams = new URLSearchParams(window.location.search);
    // Default to 'Plumber' if no category parameter is present in URL
    const selectedCategory = urlParams.get('category') || 'Plumber';

    const container = document.querySelector('.space-y-4');

    if (selectedCategory) {
        document.getElementById('category-title').innerHTML = `Available <span class="text-green-600">${selectedCategory}s</span>`;

        const filteredWorkers = allWorkers.filter(w => w.category === selectedCategory);
        container.innerHTML = "";

        if (filteredWorkers.length > 0) {
            filteredWorkers.forEach(worker => {
                container.innerHTML += `
                    <div class="bg-white p-4 sm:p-5 rounded-[1.5rem] sm:rounded-[2rem] border border-slate-200 hover:border-green-500 hover:shadow-xl transition-all group overflow-hidden">
                        <div class="flex flex-row items-center gap-3 sm:gap-5">
                            
                            <div class="flex-shrink-0 w-16 h-16 sm:w-20 sm:h-20 bg-slate-100 rounded-xl sm:rounded-2xl overflow-hidden border border-slate-200 group-hover:border-green-500 transition-colors">
                                <img src="${worker.img}" alt="${worker.name}" class="w-full h-full object-cover object-center">
                            </div>
                            
                            <div class="flex-grow min-w-0">
                                <div class="flex flex-wrap items-center gap-1.5 mb-0.5">
                                    <h3 class="text-base sm:text-xl font-black text-slate-900 leading-tight truncate">${worker.name}</h3>
                                    <span class="bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded text-[9px] font-black uppercase tracking-tight">Verified</span>
                                </div>
                                <div class="flex items-center gap-2 text-xs font-bold text-slate-500 mb-2">
                                    <span class="flex items-center gap-0.5">⭐ ${worker.rating} <span class="text-slate-300 font-normal">(${worker.reviews})</span></span>
                                    <span>•</span>
                                    <span>${worker.exp} Exp.</span>
                                </div>
                                <div class="flex flex-wrap gap-1">
                                    ${worker.tags.map(tag => `<span class="text-[8px] sm:text-[10px] bg-slate-100 px-2 py-0.5 sm:py-1 rounded-full font-bold text-slate-600 whitespace-nowrap">${tag}</span>`).join('')}
                                </div>
                            </div>

                            <div class="flex-shrink-0 text-right pl-2">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Visiting Fee</p>
                                <p class="text-lg sm:text-2xl font-black text-green-600">₹${worker.fee}</p>
                                <button onclick="confirmBooking('${worker.name}')" class="mt-1 sm:mt-2 bg-black text-white px-3 sm:px-5 py-1.5 sm:py-2 rounded-lg sm:rounded-xl text-xs sm:text-sm font-black hover:bg-green-500 hover:text-black transition-all active:scale-95">
                                    BOOK
                                </button>
                            </div>

                        </div>
                    </div>
                `;
            });
        } else {
            container.innerHTML = `<p class="text-center text-slate-400 font-bold py-20">No ${selectedCategory}s found right now.</p>`;
        }
    }

    function confirmBooking(workerName) {
        window.location.href = `success.html?worker=${encodeURIComponent(workerName)}`;
    }
</script>
</body>
</html>
