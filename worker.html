    <script>
    // 1. Updated Data Store with your local filenames
    const allWorkers = [
        { 
            name: "Venkatesh Reddy", 
            category: "Plumber", 
            rating: 4.9, 
            reviews: 124, 
            exp: "8 Years", 
            fee: 199, 
            tags: ["PIPE LEAKAGE", "TANK CLEANING"], 
            img: "images/aggi petti macha.jpg" // Updated
            
            
        },
        { 
            name: "Ravi Teja", 
            category: "Plumber", 
            rating: 4.7, 
            reviews: 89, 
            exp: "4 Years", 
            fee: 149, 
            tags: ["TAP REPAIR", "SANITARY"], 
            img: "images/uppal balu.webp" // Updated
        },
        { 
            name: "Suresh Kumar", 
            category: "Electrician", 
            rating: 4.8, 
            reviews: 210, 
            exp: "10 Years", 
            fee: 249, 
            tags: ["WIRING", "FUSE BOX"], 
            img: "images/rakesh-master.jpg" // Updated
        },
        { 
            name: "Anil Verma", 
            category: "Electrician", 
            rating: 4.6, 
            reviews: 56, 
            exp: "3 Years", 
            fee: 199, 
            tags: ["LIGHTING", "AC REPAIR"], 
            img: "images/Screenshot 2026-05-09 191500.png" // Updated
        }
    ];

    // 2. Get the category from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const selectedCategory = urlParams.get('category');

    // 3. Update Title and Filter Workers
    const container = document.querySelector('.space-y-4');

    if (selectedCategory) {
        document.getElementById('category-title').innerHTML = `Available <span class="text-green-600">${selectedCategory}s</span>`;

        const filteredWorkers = allWorkers.filter(w => w.category === selectedCategory);
        container.innerHTML = "";

        if (filteredWorkers.length > 0) {
            filteredWorkers.forEach(worker => {
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] border border-slate-200 hover:border-green-500 hover:shadow-xl transition-all group relative overflow-hidden">
                        <div class="flex items-center gap-5">
                            <div class="w-20 h-20 bg-slate-200 rounded-2xl overflow-hidden border-2 border-slate-100 group-hover:border-green-500 transition-colors">
                                <img src="${worker.img}" alt="${worker.name}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-grow">
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="text-xl font-black text-slate-900 leading-none">${worker.name}</h3>
                                    <span class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-tighter">Verified</span>
                                </div>
                                <div class="flex items-center gap-3 text-sm font-bold text-slate-500 mb-2">
                                    <span class="flex items-center gap-1">⭐ ${worker.rating} <span class="text-slate-300 font-normal">(${worker.reviews})</span></span>
                                    <span>•</span>
                                    <span>${worker.exp} Exp.</span>
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    ${worker.tags.map(tag => `<span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full font-bold text-slate-600">${tag}</span>`).join('')}
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-xs font-bold text-slate-400 uppercase">Visiting Fee</p>
                                <p class="text-2xl font-black text-green-600">₹${worker.fee}</p>
                                <button onclick="confirmBooking('${worker.name}')" class="mt-2 bg-black text-white px-5 py-2 rounded-xl text-sm font-black hover:bg-green-500 hover:text-black transition-all active:scale-90">
                                    BOOK
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        } else {
            container.innerHTML = `<p class="text-center text-slate-400 font-bold py-20">No ${selectedCategory}s found in Mudunuru right now.</p>`;
        }
    }

    function confirmBooking(workerName) {
    // Send the worker name to the success page
    window.location.href = `success.html?worker=${encodeURIComponent(workerName)}`;
}
    
</script>
