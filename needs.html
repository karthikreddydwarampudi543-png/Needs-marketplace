// 2. Function to draw the cards on the screen
function renderServices() {
    const grid = document.getElementById('serviceGrid');
    const searchTerm = document.getElementById('serviceSearch').value.toLowerCase();
    
    // Filter the array based on what the user types
    const filtered = services.filter(s => 
        s.title.toLowerCase().includes(searchTerm) || 
        s.desc.toLowerCase().includes(searchTerm)
    );

    // Generate HTML for each service
    grid.innerHTML = filtered.map(s => `
        <div onclick="selectService('${s.id}')" class="service-card group bg-green-500 p-8 rounded-[3rem] border-2 border-transparent hover:bg-white hover:border-green-500 hover:shadow-2xl cursor-pointer active:scale-95 transition-all duration-300">
            <div>
                <div class="w-14 h-14 bg-black/10 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-black transition-colors duration-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-black group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        ${s.icon}
                    </svg>
                </div>
                <h3 class="text-2xl font-black text-black uppercase leading-none">${s.title}</h3>
                <p class="text-black/60 mt-2 text-xs font-bold uppercase tracking-widest">${s.desc}</p>
            </div>
            <div class="font-black text-black text-sm uppercase mt-4 flex items-center">
                Find Pro <span class="ml-2 group-hover:translate-x-2 transition-transform">→</span>
            </div>
        </div>
    `).join('');

    // "Empty State" if no results found
    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="col-span-full py-20 text-center">
                <p class="font-bold text-slate-400 italic text-xl">No services found for "${searchTerm}"</p>
                <button onclick="document.getElementById('serviceSearch').value=''; renderServices();" class="mt-4 text-green-600 font-black uppercase text-sm underline">Clear Search</button>
            </div>`;
    }
}

function selectService(id) {
    // Navigates to worker page and passes the category in the URL
    window.location.href = `worker.html?category=${encodeURIComponent(id)}`;
}

// Initial render call to show cards on page load
renderServices();
